name: Publish Ops Dashboard

on:
  push:
    branches:
      - main
      - codex/dc-knowledge-graph
    paths:
      - "ops/**"
      - ".github/workflows/ops-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ops-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages-site
          cp -R ops pages-site/ops
          touch pages-site/.nojekyll
          cat > pages-site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=ops/progress_map.html">
            <title>DC Instructor Ops</title>
          </head>
          <body>
            <a href="ops/progress_map.html">Open DC Instructor progress map</a>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
