name: Refresh Ops Dashboard

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard branch
        uses: actions/checkout@v4
        with:
          ref: codex/dc-knowledge-graph
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate ops dashboard
        run: python3 ops/render_ops.py

      - name: Commit refreshed ops artifacts
        run: |
          if git diff --quiet -- ops; then
            echo "Ops dashboard already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops
          git commit -m "Refresh ops dashboard"
          git push origin HEAD:codex/dc-knowledge-graph
